services:
  worker:
    build: .
    command: ["biasradar", "worker", "--poll-seconds", "15"]
    env_file:
      - .env
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "biasradar", "worker-health", "--max-age-seconds", "7200"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
